name: Deploy a DigitalOcean

# Despliega automaticamente segun la branch:
#   - push a "main"    -> produccion (clon /opt/apps/App-monday, pm2 tap-monday, port 3000)
#   - push a "develop" -> staging    (clon /opt/apps/App-monday-staging, pm2 tap-monday-staging, port 3001)
# Tambien se puede disparar a mano desde la UI ("Run workflow").
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ─── Determinar a que entorno deployamos ───────────────────────────────
      # Output: name, branch, app_dir, pm2_name, health_url
      - name: Determinar entorno (prod o staging)
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "name=prod" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
            echo "app_dir=/opt/apps/App-monday" >> $GITHUB_OUTPUT
            echo "pm2_name=tap-monday" >> $GITHUB_OUTPUT
            echo "health_url=https://arca.theautomationpartner.com/api/health" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
            echo "branch=develop" >> $GITHUB_OUTPUT
            echo "app_dir=/opt/apps/App-monday-staging" >> $GITHUB_OUTPUT
            echo "pm2_name=tap-monday-staging" >> $GITHUB_OUTPUT
            echo "health_url=https://staging.theautomationpartner.com/api/health" >> $GITHUB_OUTPUT
          fi
          echo "Deploy target: ${{ github.ref }}"

      - name: Detectar qué cambió
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend_src:
              - 'frontend-repo/src/**'
              - 'frontend-repo/public/**'
              - 'frontend-repo/index.html'
              - 'frontend-repo/vite.config.js'
            frontend_deps:
              - 'frontend-repo/package.json'
              - 'frontend-repo/package-lock.json'
            backend_src:
              - 'backend-repo/src/**'
              - 'backend-repo/ecosystem.config.js'
              - 'backend-repo/ecosystem.staging.config.js'
            backend_deps:
              - 'backend-repo/package.json'
              - 'backend-repo/package-lock.json'

      # ─── Build del frontend (solo si cambió) ────────────────────────────────
      - name: Setup Node 20
        if: steps.changes.outputs.frontend_src == 'true' || steps.changes.outputs.frontend_deps == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend-repo/package-lock.json'

      - name: Install + build frontend
        if: steps.changes.outputs.frontend_src == 'true' || steps.changes.outputs.frontend_deps == 'true'
        working-directory: frontend-repo
        run: |
          npm ci
          npm run build
          ls -la dist/

      # ─── Setup SSH ──────────────────────────────────────────────────────────
      - name: Configurar SSH al droplet
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ─── Pull del código en el droplet (al clon correcto) ──────────────────
      - name: git pull en el droplet
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ${{ steps.env.outputs.app_dir }} && git pull --ff-only origin ${{ steps.env.outputs.branch }}"

      # ─── Sincronizar env vars del droplet desde GitHub Secrets ──────────────
      # MONDAY_CLIENT_ID se sincroniza al .env de cada clon.
      - name: Sincronizar MONDAY_CLIENT_ID en el droplet
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ${{ steps.env.outputs.app_dir }}/backend-repo && \
             sed -i '/^MONDAY_CLIENT_ID=/d' .env 2>/dev/null; \
             echo 'MONDAY_CLIENT_ID=${{ secrets.MONDAY_CLIENT_ID }}' >> .env && \
             echo '[deploy] MONDAY_CLIENT_ID sincronizado en ${{ steps.env.outputs.name }}'"

      # ─── Deploy del frontend (solo si se buildeó) ──────────────────────────
      - name: Subir frontend al droplet (atomic swap)
        if: steps.changes.outputs.frontend_src == 'true' || steps.changes.outputs.frontend_deps == 'true'
        run: |
          # dir temporal especifico al entorno para evitar colisiones
          TMP_DIR="/tmp/dist_new_${{ steps.env.outputs.name }}"
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "rm -rf $TMP_DIR && mkdir -p $TMP_DIR"

          scp -r frontend-repo/dist/* \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:$TMP_DIR/

          # Atomic swap dentro del clon correcto
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} "
            cd ${{ steps.env.outputs.app_dir }}/backend-repo
            rm -rf public_old
            mv public public_old 2>/dev/null || true
            mv $TMP_DIR public
            rm -rf public_old
            echo '[deploy] frontend swap OK (${{ steps.env.outputs.name }}) — hash:'
            ls public/assets/ | grep '.js\$' || true
          "

      # ─── Backend deps (solo si cambió package.json) ────────────────────────
      - name: Reinstalar deps del backend
        if: steps.changes.outputs.backend_deps == 'true'
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ${{ steps.env.outputs.app_dir }}/backend-repo && npm install --omit=dev"

      # ─── Reload PM2 (solo si cambió código del backend) ─────────────────────
      - name: Reload PM2
        if: steps.changes.outputs.backend_src == 'true' || steps.changes.outputs.backend_deps == 'true'
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "pm2 reload ${{ steps.env.outputs.pm2_name }} --update-env && sleep 2 && pm2 list | grep ${{ steps.env.outputs.pm2_name }}"

      # ─── Smoke test ────────────────────────────────────────────────────────
      # Polling hasta 45s para esperar startup completo (migrations etc.).
      - name: Verificar que la app responde
        run: |
          ENDPOINT="${{ steps.env.outputs.health_url }}"
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$ENDPOINT" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ App respondiendo OK (HTTP $STATUS) en intento $i"
              exit 0
            fi
            echo "  intento $i: HTTP $STATUS — reintento en 3s"
            sleep 3
          done
          echo "❌ App no respondió 200 en 45s (último: HTTP $STATUS)"
          exit 1

      # ─── Resumen ───────────────────────────────────────────────────────────
      - name: Resumen del deploy
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "  RESUMEN DEL DEPLOY"
          echo "════════════════════════════════════════"
          echo "Entorno:       ${{ steps.env.outputs.name }}"
          echo "Branch:        ${{ steps.env.outputs.branch }}"
          echo "App dir:       ${{ steps.env.outputs.app_dir }}"
          echo "PM2 process:   ${{ steps.env.outputs.pm2_name }}"
          echo "URL health:    ${{ steps.env.outputs.health_url }}"
          echo "Frontend src:  ${{ steps.changes.outputs.frontend_src }}"
          echo "Frontend deps: ${{ steps.changes.outputs.frontend_deps }}"
          echo "Backend src:   ${{ steps.changes.outputs.backend_src }}"
          echo "Backend deps:  ${{ steps.changes.outputs.backend_deps }}"
          echo "════════════════════════════════════════"
