name: Deploy a DigitalOcean

# Se ejecuta automáticamente en cada push a main.
# También se puede disparar a mano desde la UI de Actions ("Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          # Necesitamos al menos 2 commits para poder ver qué cambió
          fetch-depth: 2

      - name: Detectar qué cambió
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend_src:
              - 'frontend-repo/src/**'
              - 'frontend-repo/public/**'
              - 'frontend-repo/index.html'
              - 'frontend-repo/vite.config.js'
            frontend_deps:
              - 'frontend-repo/package.json'
              - 'frontend-repo/package-lock.json'
            backend_src:
              - 'backend-repo/src/**'
              - 'backend-repo/ecosystem.config.js'
            backend_deps:
              - 'backend-repo/package.json'
              - 'backend-repo/package-lock.json'

      # ─── Build del frontend (solo si cambió) ────────────────────────────────
      - name: Setup Node 20
        if: steps.changes.outputs.frontend_src == 'true' || steps.changes.outputs.frontend_deps == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend-repo/package-lock.json'

      - name: Install + build frontend
        if: steps.changes.outputs.frontend_src == 'true' || steps.changes.outputs.frontend_deps == 'true'
        working-directory: frontend-repo
        run: |
          npm ci
          npm run build
          ls -la dist/

      # ─── Setup SSH ──────────────────────────────────────────────────────────
      - name: Configurar SSH al droplet
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ─── Pull del código en el droplet ──────────────────────────────────────
      - name: git pull en el droplet
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd /opt/apps/App-monday && git pull --ff-only origin main"

      # ─── Sincronizar env vars del droplet desde GitHub Secrets ──────────────
      # Mantiene el .env del droplet alineado con los secrets de GitHub. Es
      # idempotente: si la línea ya existe, la sobrescribe; si no, la agrega.
      - name: Sincronizar MONDAY_CLIENT_ID en el droplet
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd /opt/apps/App-monday/backend-repo && \
             sed -i '/^MONDAY_CLIENT_ID=/d' .env 2>/dev/null; \
             echo 'MONDAY_CLIENT_ID=${{ secrets.MONDAY_CLIENT_ID }}' >> .env && \
             pm2 restart tap-monday --update-env && \
             echo '[deploy] MONDAY_CLIENT_ID sincronizado + pm2 reload'"

      # ─── Deploy del frontend (solo si se buildeó) ──────────────────────────
      - name: Subir frontend al droplet (atomic swap)
        if: steps.changes.outputs.frontend_src == 'true' || steps.changes.outputs.frontend_deps == 'true'
        run: |
          # Limpiar dir temporal en el droplet
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "rm -rf /tmp/dist_new && mkdir -p /tmp/dist_new"

          # Subir el dist
          scp -r frontend-repo/dist/* \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/tmp/dist_new/

          # Atomic swap: mover el viejo, mover el nuevo, borrar el viejo
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} '
            cd /opt/apps/App-monday/backend-repo
            rm -rf public_old
            mv public public_old 2>/dev/null || true
            mv /tmp/dist_new public
            rm -rf public_old
            echo "[deploy] frontend swap OK — hash:"
            ls public/assets/ | grep ".js$"
          '

      # ─── Backend deps (solo si cambió package.json) ────────────────────────
      - name: Reinstalar deps del backend
        if: steps.changes.outputs.backend_deps == 'true'
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd /opt/apps/App-monday/backend-repo && npm install --omit=dev"

      # ─── Reload PM2 (solo si cambió código del backend) ─────────────────────
      - name: Reload PM2
        if: steps.changes.outputs.backend_src == 'true' || steps.changes.outputs.backend_deps == 'true'
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "pm2 reload tap-monday --update-env && sleep 2 && pm2 list | grep tap-monday"

      # ─── Smoke test ────────────────────────────────────────────────────────
      # Poll en vez de un único curl: PM2 reload puede tardar 5-10s en que el
      # proceso nuevo escuche, sobre todo si el server.js corre migraciones
      # de DB en startup. Reintentamos cada 3s hasta 45s totales.
      - name: Verificar que la app responde
        run: |
          ENDPOINT="https://arca.theautomationpartner.com/api/health"
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$ENDPOINT" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ App respondiendo OK (HTTP $STATUS) en intento $i"
              exit 0
            fi
            echo "  intento $i: HTTP $STATUS — reintento en 3s"
            sleep 3
          done
          echo "❌ App no respondió 200 en 45s (último: HTTP $STATUS)"
          exit 1

      # ─── Resumen ───────────────────────────────────────────────────────────
      - name: Resumen del deploy
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "  RESUMEN DEL DEPLOY"
          echo "════════════════════════════════════════"
          echo "Frontend src cambió: ${{ steps.changes.outputs.frontend_src }}"
          echo "Frontend deps cambió: ${{ steps.changes.outputs.frontend_deps }}"
          echo "Backend src cambió: ${{ steps.changes.outputs.backend_src }}"
          echo "Backend deps cambió: ${{ steps.changes.outputs.backend_deps }}"
          echo "════════════════════════════════════════"
