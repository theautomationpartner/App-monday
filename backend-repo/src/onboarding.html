<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>How to use Factura ARCA</title>
    <style>
        :root {
            --navy: #071F32;
            --navy-600: #0D2D48;
            --navy-500: #163F5E;
            --yellow: #F0CA29;
            --bg: #F3F6FA;
            --text: #1a202c;
            --text-light: #4a5568;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--navy-500); }
        a:hover { color: var(--navy); }

        .page {
            max-width: 920px;
            margin: 0 auto;
            padding: 24px 20px 80px;
        }
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 16px;
        }
        .lang-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-light);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s ease;
        }
        .lang-btn:hover { border-color: var(--navy-500); color: var(--navy); }
        .lang-btn.active {
            background: var(--navy);
            color: #fff;
            border-color: var(--navy);
        }
        .hero {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-500) 100%);
            color: #fff;
            padding: 48px 40px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 32px;
        }
        .hero-kicker {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--yellow);
            margin-bottom: 12px;
        }
        .hero h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            line-height: 1.2;
        }
        .hero p {
            font-size: 16px;
            color: rgba(255, 255, 255, .85);
            max-width: 600px;
            margin: 0 auto;
        }

        .section {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .04), 0 4px 12px rgba(7, 31, 50, .04);
        }
        .section h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 16px;
            letter-spacing: -0.01em;
        }
        .section p {
            color: var(--text-light);
            margin-bottom: 14px;
        }
        .section p:last-child { margin-bottom: 0; }

        .prereqs {
            list-style: none;
            padding: 0;
            margin: 12px 0 0;
        }
        .prereqs li {
            position: relative;
            padding: 10px 0 10px 32px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
        }
        .prereqs li:last-child { border-bottom: none; }
        .prereqs li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 14px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--yellow);
        }
        .prereqs li::after {
            content: "✓";
            position: absolute;
            left: 4px;
            top: 12px;
            color: var(--navy);
            font-weight: 700;
            font-size: 13px;
        }

        .step {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 28px 0;
            border-top: 1px solid var(--border);
        }
        .step:first-child { border-top: none; padding-top: 8px; }
        .step-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .step-num {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--yellow);
            color: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }
        .step-title {
            font-size: 19px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 6px;
        }
        .step-desc {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-light);
        }
        .step-img-wrap {
            margin-left: 56px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg);
        }
        .step-img {
            display: block;
            width: 100%;
            height: auto;
        }

        .footer-note {
            text-align: center;
            color: var(--text-light);
            font-size: 14px;
            margin-top: 32px;
            padding: 24px;
        }
        .footer-note a { font-weight: 600; }

        @media (max-width: 640px) {
            .hero { padding: 32px 24px; }
            .hero h1 { font-size: 24px; }
            .section { padding: 24px 20px; }
            .step-img-wrap { margin-left: 0; }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="lang-switch">
            <button type="button" class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
            <button type="button" class="lang-btn" data-lang="es" onclick="setLang('es')">Español</button>
        </div>

        <header class="hero">
            <div class="hero-kicker">monday app · Factura ARCA</div>
            <h1 data-i18n="heroTitle"></h1>
            <p data-i18n="heroSub"></p>
        </header>

        <section class="section">
            <h2 data-i18n="prereqTitle"></h2>
            <p data-i18n="prereqIntro"></p>
            <ul class="prereqs">
                <li data-i18n="prereq1"></li>
                <li data-i18n="prereq2"></li>
                <li data-i18n="prereq3"></li>
                <li data-i18n="prereq4"></li>
            </ul>
        </section>

        <section class="section">
            <h2 data-i18n="setupTitle"></h2>

            <div class="step">
                <div class="step-header">
                    <div class="step-num">1</div>
                    <div>
                        <div class="step-title" data-i18n="step1Title"></div>
                        <div class="step-desc" data-i18n="step1Desc"></div>
                    </div>
                </div>
                <div class="step-img-wrap">
                    <img class="step-img" data-img="step1" alt="" />
                </div>
            </div>

            <div class="step">
                <div class="step-header">
                    <div class="step-num">2</div>
                    <div>
                        <div class="step-title" data-i18n="step2Title"></div>
                        <div class="step-desc" data-i18n="step2Desc"></div>
                    </div>
                </div>
                <div class="step-img-wrap">
                    <img class="step-img" data-img="step2" alt="" />
                </div>
            </div>

            <div class="step">
                <div class="step-header">
                    <div class="step-num">3</div>
                    <div>
                        <div class="step-title" data-i18n="step3Title"></div>
                        <div class="step-desc" data-i18n="step3Desc"></div>
                    </div>
                </div>
                <div class="step-img-wrap">
                    <img class="step-img" data-img="step3" alt="" />
                </div>
            </div>
        </section>

        <section class="section">
            <h2 data-i18n="emitTitle"></h2>
            <p data-i18n="emitIntro"></p>
            <ol style="padding-left: 20px; color: var(--text-light); line-height: 1.9;">
                <li data-i18n="emit1"></li>
                <li data-i18n="emit2"></li>
                <li data-i18n="emit3"></li>
                <li data-i18n="emit4"></li>
            </ol>
            <p style="margin-top: 16px;" data-i18n="emitTime"></p>
        </section>

        <section class="section">
            <h2 data-i18n="supportTitle"></h2>
            <p data-i18n="supportIntro"></p>
            <p data-i18n="supportContact"></p>
            <p style="margin-top: 16px;" data-i18n="supportPrivacy"></p>
        </section>

        <div class="footer-note" data-i18n="footer"></div>
    </main>

    <script>

                emitTitle: "Cómo emitir una factura",

                emit2: "Llenar los subitems con cada concepto a facturar (descripción, cantidad, precio, IVA)",

            },
            en: {

                prereq1: "An active AFIP/ARCA tax ID (CUIT) enabled for electronic invoicing",
                prereq2: "A digital certificate (.crt and .key), or the ARCA service registration to generate it from the app",

                setupTitle: "Set up the app in 3 steps",
                step1Title: "Enter your tax details",

                emitIntro: "Once the app is set up, issuing an invoice works like this:",

                emit3: "Change the \"Voucher Status\" column to <strong>\"Create Voucher\"</strong>",
                emit4: "The automation triggers the emission: validation against the AFIP registry → CAE retrieval → PDF generation → attached to the item",
                emitTime: "Total time per invoice: <strong>5-10 seconds</strong>.",
                supportTitle: "Support and privacy",
                supportIntro: "Have a question or something isn't working as expected?",
                supportContact: "Email us at <a href=\"mailto:arca@theautomationpartner.com\">arca@theautomationpartner.com</a>. We reply within 2 business days.",
                supportPrivacy: "Your certificates and tax data are stored encrypted with AES-256, communication with ARCA uses AFIP's official web services (WSAA + WSFEv1), and when you uninstall the app all your operational data is automatically deleted within 10 days.",
                footer: "Factura ARCA — developed by <a href=\"https://theautomationpartner.com\" target=\"_blank\" rel=\"noopener\">The Automation Partner</a>"
            }
        };

        var IMG = {
            es: { step1: "/onboarding/step-1-datos.png", step2: "/onboarding/step-2-certificados.png", step3: "/onboarding/step-3-mapeo.png" },
            en: { step1: "/onboarding/step-1-datos-en.png", step2: "/onboarding/step-2-certificados-en.png", step3: "/onboarding/step-3-mapeo-en.png" }
        };

        function setLang(lang) {
            if (lang !== 'en' && lang !== 'es') lang = 'es';
            var dict = TR[lang];
            document.documentElement.lang = lang;
            document.title = dict.docTitle;
            document.querySelectorAll('[data-i18n]').forEach(function (el) {
                el.innerHTML = dict[el.getAttribute('data-i18n')] || '';
            });
            document.querySelectorAll('[data-img]').forEach(function (el) {
                var key = el.getAttribute('data-img');
                el.src = IMG[lang][key];
                el.alt = dict[key + 'Alt'] || '';
            });
            document.querySelectorAll('.lang-btn').forEach(function (b) {
                b.classList.toggle('active', b.getAttribute('data-lang') === lang);
            });
            try { localStorage.setItem('arca_onboarding_lang', lang); } catch (e) {}
        }

        (function () {
            var params = new URLSearchParams(window.location.search);
            var lang = params.get('lang');
            if (lang !== 'en' && lang !== 'es') {
                try { lang = localStorage.getItem('arca_onboarding_lang'); } catch (e) {}
            }
            if (lang !== 'en' && lang !== 'es') {
                lang = (navigator.language || 'es').toLowerCase().indexOf('es') === 0 ? 'es' : 'en';
            }
            setLang(lang);
        })();
    </script>
</body>
</html>
